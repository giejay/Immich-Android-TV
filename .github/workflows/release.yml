name: Create Release on Tag

on:
  push:
    branches: [ "feature/*" ]
  workflow_dispatch:
    inputs:
      releaseName:
        description: 'Release name/version (leave empty to use current version from build.gradle)'
        required: false
        default: ''
      increaseVersion:
        description: 'Increase versionCode'
        required: false
        type: boolean
        default: false
      publishPlayStore:
        description: 'Publish to Google Play Store'
        required: false
        type: boolean
        default: true
      publishGitHub:
        description: 'Publish to GitHub Release'
        required: false
        type: boolean
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Extract version and update if needed
        id: version
        run: |
          GRADLE_FILE="app/build.gradle"
          CURRENT_VERSION=$(grep 'versionName' "$GRADLE_FILE" | grep -o '".*"' | sed 's/"//g' | head -1)
          CURRENT_CODE=$(grep 'versionCode' "$GRADLE_FILE" | head -1 | grep -o '[0-9]\+')
          
          RELEASE_NAME="${{ inputs.releaseName }}"
          if [ -z "$RELEASE_NAME" ]; then
            RELEASE_NAME="$CURRENT_VERSION"
          fi
          
          NEW_CODE=$CURRENT_CODE
          if [ "${{ inputs.increaseVersion }}" = "true" ]; then
            NEW_CODE=$((CURRENT_CODE + 1))
            sed -i '' "s/versionName \".*\"/versionName \"$RELEASE_NAME\"/" "$GRADLE_FILE"
            sed -i '' "s/versionCode $CURRENT_CODE/versionCode $NEW_CODE/" "$GRADLE_FILE"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$GRADLE_FILE"
            git commit -m "Create new release: $RELEASE_NAME ($NEW_CODE)"
            git push origin HEAD:${{ github.ref }}
          fi
          
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$NEW_CODE" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: google-services.json and extra strings file
        env:
          GOOGLE_SERVICES_BASE64: ${{secrets.GOOGLE_SERVICES_BASE64}}
          STRINGS_OTHER_BASE64: ${{secrets.STRINGS_OTHER}}
        run: |
          echo $GOOGLE_SERVICES_BASE64 | base64 --decode > ./app/google-services.json
          echo $STRINGS_OTHER_BASE64 | base64 --decode > ./app/src/main/res/values/strings_other.xml

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > release-keystore.jks

      - name: Build signed APK and AAB
        env:
          RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/release-keystore.jks
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew assembleRelease bundleRelease

      - name: Get commit messages since last release
        id: get_commits
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "Last tag: $LAST_TAG"
          if [ -z "$LAST_TAG" ]; then
            echo "No previous tag found. Getting all commits."
            git log --pretty=format:'%h %s' | awk '!/^[0-9a-f]+ Create new release:/' > commits.txt
            git log --pretty=format:'%s' | awk '!/^Create new release:/' > commits_playstore.txt
          else
            echo "Previous tag: $LAST_TAG"
            git log "$LAST_TAG"..HEAD --pretty=format:'%h %s' | awk '!/^[0-9a-f]+ Create new release:/' > commits.txt
            git log "$LAST_TAG"..HEAD --pretty=format:'%s' | awk '!/^Create new release:/' > commits_playstore.txt
          fi

      - name: Set release notes
        id: set_release_notes
        run: |
          RELEASE_NOTES=$(cat commits.txt)
          RELEASE_NOTES="${RELEASE_NOTES//'%'/'%25'}"
          RELEASE_NOTES="${RELEASE_NOTES//$'\n'/'%0A'}"
          RELEASE_NOTES="${RELEASE_NOTES//$'\r'/'%0D'}"
          echo "value=$RELEASE_NOTES" >> $GITHUB_OUTPUT
          echo "Release Notes: $RELEASE_NOTES"

      - name: Prepare Play Store release notes
        run: |
          mkdir -p play-whatsnew
          cp commits_playstore.txt play-whatsnew/whatsnew-en-US
          ls -ltr app/build/outputs/bundle/release
          ls -ltr app/build/outputs/apk/release

      - name: Upload AAB to Google Play
        uses: r0adkll/upload-google-play@v1.1.5
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publishPlayStore == 'true' }}
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: nl.giejay.android.tv.immich
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          tracks: ${{ vars.PLAY_STORE_TRACK || 'production' }}
          status: ${{ vars.PLAY_STORE_STATUS || 'completed' }}
          whatsNewDirectory: play-whatsnew

      - name: Create Release
        id: create_release
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publishGitHub == 'true' }}
        uses: actions/create-release@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            ${{ steps.set_release_notes.outputs.value }}
          draft: false
          prerelease: false

      - name: Set APK asset path
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publishGitHub == 'true' }}
        id: set_apk_path
        run: |
          APK_PATH=$(ls -1 app/build/outputs/apk/release/*.apk | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found in app/build/outputs/apk/release"
            exit 1
          fi
          APK_NAME=$(basename "$APK_PATH")
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "APK Name: $APK_NAME"
          echo "APK Path: $APK_PATH"

      - name: Upload APK Asset
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publishGitHub == 'true' }}
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.set_apk_path.outputs.apk_path }}
          asset_name: ${{ steps.set_apk_path.outputs.apk_name }}
          asset_content_type: application/vnd.android.package-archive
